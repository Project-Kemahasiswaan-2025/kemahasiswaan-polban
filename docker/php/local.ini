error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On

memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
max_input_time = 300
default_socket_timeout = 300
request_terminate_timeout = 300

session.gc_maxlifetime = 1440
session.cookie_lifetime = 0
